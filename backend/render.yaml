services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: mealmate-api
    env: node
    region: singapore        # Closest to India
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.prod.js
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard (your Supabase URL)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL after deploying frontend
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /api/health
